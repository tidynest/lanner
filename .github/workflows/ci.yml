name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-4-dev libwayland-dev wayland-protocols meson ninja-build
      - name: Build and install gtk4-layer-shell
        # Not packaged on Ubuntu, so build the C library from source.
        run: |
          git clone --depth 1 https://github.com/wmww/gtk4-layer-shell /tmp/gls
          meson setup --prefix=/usr -Dintrospection=false -Dvapi=false -Dexamples=false -Ddocs=false -Dtests=false /tmp/gls/build /tmp/gls
          ninja -C /tmp/gls/build
          sudo ninja -C /tmp/gls/build install
          sudo ldconfig
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Test
        run: cargo test --all
      - name: Build
        run: cargo build --release

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: rustsec/audit-check@v2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
