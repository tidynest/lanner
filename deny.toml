# cargo-deny configuration, checked by the pre-push gate (rust-sec-ci).
# Docs: https://embarkstudios.github.io/cargo-deny/

[graph]
all-features = false
no-default-features = false

[advisories]
# lanner's dependency tree currently passes the advisory check with no waivers.
# Add { id = "RUSTSEC-...", reason = "..." } entries here only when a transitive,
# unfixable advisory needs an explicit, documented exception.
ignore = []

[licenses]
# Permissive licences present in the GTK4 / wlroots dependency tree. lanner
# itself is GPL-3.0-or-later, which is compatible with these permissive
# dependencies.
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    "CDLA-Permissive-2.0",
    "GPL-3.0-or-later",
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.8

[bans]
multiple-versions = "warn"
wildcards = "allow"

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
